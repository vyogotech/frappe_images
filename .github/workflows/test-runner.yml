name: Test ARC Runner
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-cluster-runner:
    # Use the name of the Runner Scale Set deployed via ArgoCD
    runs-on: arc-runner-set
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verify runner environment
        run: |
          echo "🎉 This job is running on the self-hosted Kubernetes runner!"
          echo "Hostname: $(hostname)"
          echo "OS: $(cat /etc/os-release | grep PRETTY_NAME | cut -d '=' -f 2)"
          echo "Memory: $(free -h)"
          echo "Current directory: $(pwd)"
          
      - name: Test kubectl (Optional - if RBAC allows)
        run: |
          echo "Checking if we can talk to the Kubernetes API..."
          curl -k -s -v https://kubernetes.default.svc || echo "Cannot reach Kube API"
